# ===============================
# APPLICATION
# ===============================
spring.application.name=user-service-api
server.port=8080

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/user_service26
spring.datasource.username=user_service_user26
spring.datasource.password=UserService1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE (DDL AUTO-GENERATION)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# ERROR HANDLING (ENABLE FOR DEBUGGING)
# ===============================
server.error.include-message=always
server.error.include-stacktrace=on-param
logging.level.com.chinmay.user_service_api=DEBUG
